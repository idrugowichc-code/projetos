.hc-tab.on{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.hc-kg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.hc-kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px 13px}
.hc-kl{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.hc-kv{font-size:17px;font-weight:500;color:var(--color-text-primary);line-height:1.1}
.hc-kd{font-size:11px;margin-top:4px}
.hc-kp{font-size:10px;margin-top:2px;color:var(--color-text-secondary)}
.up{color:#1D9E75}.dn{color:#E24B4A}.nt{color:var(--color-text-secondary)}
.hc-g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.hc-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.hc-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:1rem}
.hc-ct{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.hc-cw{position:relative;width:100%}
.hc-fn{display:flex;flex-direction:column;gap:7px}
.hc-fr{display:flex;align-items:center;gap:8px}
.hc-fl{font-size:11px;color:var(--color-text-secondary);width:72px;flex-shrink:0;text-align:right}
.hc-ft{flex:1;background:var(--color-background-secondary);border-radius:3px;height:22px;overflow:hidden}
.hc-ff{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:7px;font-size:11px;font-weight:500;color:#fff}
.hc-fp{font-size:11px;color:var(--color-text-secondary);width:34px;flex-shrink:0}
.hc-ins{display:flex;flex-direction:column;gap:7px}
.hc-in{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.hc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}

.hc-sb{width:3px;border-radius:1px}
.hc-ob{display:flex;flex-direction:column;gap:6px}
.hc-or{display:flex;align-items:center;gap:8px}
.hc-ol{font-size:11px;color:var(--color-text-secondary);width:110px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hc-ot{flex:1;background:var(--color-background-secondary);border-radius:3px;height:18px;overflow:hidden}
.hc-of{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:500;color:#fff}
.hc-on{font-size:11px;color:var(--color-text-secondary);width:38px;flex-shrink:0;text-align:right}

.hc-pane{display:none}
.hc-pane.on{display:block}
</style>

var MNS=['JAN','FEV','MAR'];
var wMon=2,oMon=2,fMon=2;
var CH={};

function gM(n){return D.find(function(d){return d.nm===n;});}
function fm(n){return (n||0).toLocaleString('pt-BR',{maximumFractionDigits:0});}
function fmR(n){return 'R$\u00a0'+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmRs(n){return 'R$\u00a0'+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function pc(a,b){return b?((a/b)*100).toFixed(1)+'%':'—';}
function dl(c,p){
  if(!p) return '<span class="nt">—</span>';
  var d=((c-p)/p*100);
  return '<span class="'+(d>=0?'up':'dn')+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(1)+'%</span>';
}
function dch(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function sk(vals,col){
  var mx=Math.max.apply(null,vals.concat([1]));
  return '<span class="hc-sk">'+vals.map(function(v){
    return '<span class="hc-sb" style="height:'+Math.max(2,Math.round((v/mx)*12))+'px;background:'+col+'88"></span>';
  }).join('')+'</span>';
}
function dlPlugin(color,fmt_fn){
  return {id:'dlp'+Math.floor(Math.random()*9999),afterDatasetsDraw:function(chart){
    var ctx=chart.ctx;
    chart.data.datasets.forEach(function(ds,di){
      var meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      meta.data.forEach(function(bar,i){
        var val=ds.data[i]; if(!val) return;
        var txt=fmt_fn?fmt_fn(val):fm(val);
        ctx.save();ctx.font='500 10px sans-serif';ctx.fillStyle=color||'#888';
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(txt,bar.x,bar.y-3);ctx.restore();
      });
    });
  }};
}
function txtC(){return window.matchMedia('(prefers-color-scheme: dark)').matches?'#aaa':'#888';}

function initKPI(){
  var cur=gM('MAR'),pv=gM('FEV');
  var tk=cur.to.ve?cur.to.re/cur.to.ve:0;
  var tkP=pv.to.ve?pv.to.re/pv.to.ve:0;
  var rows=[
    {l:'Leads',      cv:fm(cur.to.le),   pv:fm(pv.to.le),    d:dl(cur.to.le,pv.to.le)},
    {l:'Orçamentos', cv:fm(cur.to.or),   pv:fm(pv.to.or),    d:dl(cur.to.or,pv.to.or)},
    {l:'Vendas',     cv:fm(cur.to.ve),   pv:fm(pv.to.ve),    d:dl(cur.to.ve,pv.to.ve)},
    {l:'Receita',    cv:fmRs(cur.to.re), pv:fmRs(pv.to.re),  d:dl(cur.to.re,pv.to.re)},
    {l:'Ticket médio',cv:fmR(tk),        pv:fmR(tkP),        d:dl(tk,tkP)},
    {l:'% Qualif.',  cv:pc(cur.to.qu,cur.to.le),pv:pc(pv.to.qu,pv.to.le),d:dl(cur.to.qu/cur.to.le,pv.to.qu/pv.to.le)},
    {l:'Conv. L→V',  cv:pc(cur.to.ve,cur.to.le),pv:pc(pv.to.ve,pv.to.le),d:dl(cur.to.ve/cur.to.le,pv.to.ve/pv.to.le)},
    {l:'Conv. Orc→V',cv:pc(cur.to.ve,cur.to.or),pv:pc(pv.to.ve,pv.to.or),d:dl(cur.to.ve/cur.to.or,pv.to.ve/pv.to.or)}
  ];
  document.getElementById('kgrid').innerHTML=rows.map(function(r){
    return '<div class="hc-kpi"><div class="hc-kl">'+r.l+'</div><div class="hc-kv">'+r.cv+'</div><div class="hc-kd">'+r.d+' vs fev</div><div class="hc-kp">Fev: '+r.pv+'</div></div>';
  }).join('');
}

function initFunnel(){
  var t=gM('MAR').to;
  var steps=[{l:'Leads',v:t.le,c:'#378ADD'},{l:'Qualif.',v:t.qu,c:'#BA7517'},{l:'Orçam.',v:t.or,c:'#8B5CF6'},{l:'Vendas',v:t.ve,c:'#1D9E75'}];
  document.getElementById('funnel').innerHTML=steps.map(function(b){
    var w=Math.max(3,Math.round((b.v/t.le)*100));
    return '<div class="hc-fr"><div class="hc-fl">'+b.l+'</div><div class="hc-ft"><div class="hc-ff" style="width:'+w+'%;background:'+b.c+'">'+fm(b.v)+'</div></div><div class="hc-fp">'+w+'%</div></div>';
  }).join('');
}

function initInsights(){
  var mar=gM('MAR'),fev=gM('FEV'),jan=gM('JAN');
  var items=[];
  var convL=mar.to.ve/mar.to.le;
  var convO=mar.to.or?mar.to.ve/mar.to.or:0;
  var tk=mar.to.ve?mar.to.re/mar.to.ve:0;
  var tkP=fev.to.ve?fev.to.re/fev.to.ve:0;

  if(mar.to.re>fev.to.re*1.3) items.push({c:'#1D9E75',t:'Receita de março ('+fmRs(mar.to.re)+') cresceu '+((mar.to.re/fev.to.re-1)*100).toFixed(0)+'% vs fevereiro — melhor mês do trimestre.'});
  if(mar.to.le>fev.to.le) items.push({c:'#1D9E75',t:'Leads cresceram '+((mar.to.le/fev.to.le-1)*100).toFixed(0)+'% vs fev ('+fm(fev.to.le)+'→'+fm(mar.to.le)+'). Forte topo de funil.'});
  if(mar.to.qu/mar.to.le > fev.to.qu/fev.to.le) items.push({c:'#1D9E75',t:'Qualificação subiu para '+pc(mar.to.qu,mar.to.le)+' — melhora vs fev ('+pc(fev.to.qu,fev.to.le)+'). Funil mais saudável.'});
  if(convO<0.40) items.push({c:'#BA7517',t:'Conv. Orc→Venda em '+pc(mar.to.ve,mar.to.or)+'. Com 54 orçamentos abertos, há espaço para elevar fechamentos.'});
  if(tk<tkP) items.push({c:'#BA7517',t:'Ticket médio caiu de '+fmRs(tkP)+' para '+fmRs(tk)+'. Analisar mix de clientes e negócios de menor valor.'});
  var bw=mar.wk.slice().sort(function(a,b){return b.re-a.re;})[0];
  items.push({c:'#378ADD',t:'Melhor semana: '+bw.w+' ('+bw.lb+') com '+fmRs(bw.re)+' e '+bw.ve+' vendas fechadas.'});

  document.getElementById('insights').innerHTML=items.map(function(i){
    return '<div class="hc-in"><div class="hc-dot" style="background:'+i.c+'"></div><span>'+i.t+'</span></div>';
  }).join('');
}

  });
  dch('cLV');
  CH['cLV']=new Chart(document.getElementById('cLV'),{
