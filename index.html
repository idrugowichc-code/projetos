function gM(n){ return D.find(function(d){return d.nm===n;}); }
function fm(n){ return (n||0).toLocaleString('pt-BR',{maximumFractionDigits:0}); }
function fmR(n){ return 'R$\u00a0'+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmRs(n){ return 'R$\u00a0'+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function pc(a,b){ return b ? ((a/b)*100).toFixed(1)+'%' : '—'; }
function dl(c,p){
  if(!p) return '<span class="nt">—</span>';
  var d=((c-p)/p*100);
  return '<span class="'+(d>=0?'up':'dn')+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(1)+'%</span>';
}
function dch(id){ if(CH[id]){ CH[id].destroy(); delete CH[id]; } }
function sk(vals,col){
  var mx=Math.max.apply(null,vals.concat([1]));
  return '<span class="hc-sk">'+vals.map(function(v){
    return '<span class="hc-sb" style="height:'+Math.max(2,Math.round((v/mx)*12))+'px;background:'+col+'88"></span>';
  }).join('')+'</span>';
}

// labels datalabels plugin inline via Chart.js defaults
function datalabelsPlugin(color, fmt_fn){
  return {
    id: 'dl_'+Math.random(),
    afterDatasetsDraw: function(chart){
      var ctx=chart.ctx;
      chart.data.datasets.forEach(function(ds,di){
        var meta=chart.getDatasetMeta(di);
        if(meta.hidden) return;
        meta.data.forEach(function(bar,i){
          var val=ds.data[i];
          if(!val) return;
          var txt=fmt_fn ? fmt_fn(val) : fm(val);
          ctx.save();
          ctx.font='500 10px sans-serif';
          ctx.fillStyle=color||'#888';
          ctx.textAlign='center';
          ctx.textBaseline='bottom';
          var y=bar.y-3;
          ctx.fillText(txt,bar.x,y);
          ctx.restore();
        });
      });
    }
  };
}

// PANORAMA KPIs
function initKPI(){
  var cur=gM('MAR'), pv=gM('FEV');
  var tk=cur.to.ve?cur.to.re/cur.to.ve:0;
  var tkP=pv.to.ve?pv.to.re/pv.to.ve:0;
  var rows=[
    {l:'Leads',        cv:fm(cur.to.le),  pv:fm(pv.to.le),      d:dl(cur.to.le,pv.to.le)},
    {l:'Orçamentos',   cv:fm(cur.to.or),  pv:fm(pv.to.or),      d:dl(cur.to.or,pv.to.or)},
    {l:'Vendas',       cv:fm(cur.to.ve),  pv:fm(pv.to.ve),      d:dl(cur.to.ve,pv.to.ve)},
    {l:'Receita',      cv:fmRs(cur.to.re),pv:fmRs(pv.to.re),    d:dl(cur.to.re,pv.to.re)},
    {l:'Ticket médio', cv:fmR(tk),        pv:fmR(tkP),          d:dl(tk,tkP)},
    {l:'% Qualif.',    cv:pc(cur.to.qu,cur.to.le), pv:pc(pv.to.qu,pv.to.le), d:dl(cur.to.qu/cur.to.le,pv.to.qu/pv.to.le)},
    {l:'Conv. L→V',    cv:pc(cur.to.ve,cur.to.le), pv:pc(pv.to.ve,pv.to.le), d:dl(cur.to.ve/cur.to.le,pv.to.ve/pv.to.le)},
    {l:'Conv. Orc→V',  cv:pc(cur.to.ve,cur.to.or), pv:pc(pv.to.ve,pv.to.or), d:dl(cur.to.ve/cur.to.or,pv.to.ve/pv.to.or)}
  ];
  document.getElementById('kgrid').innerHTML=rows.map(function(r){
    return '<div class="hc-kpi">'+
      '<div class="hc-kl">'+r.l+'</div>'+
      '<div class="hc-kv">'+r.cv+'</div>'+
      '<div class="hc-kd">'+r.d+' vs fev</div>'+
      '<div class="hc-kp">Fev: '+r.pv+'</div>'+
      '</div>';
  }).join('');
}

function initFunnel(){
  var t=gM('MAR').to;
  var steps=[
    {l:'Leads',   v:t.le,c:'#378ADD'},
    {l:'Qualif.', v:t.qu,c:'#BA7517'},
    {l:'Orçam.',  v:t.or,c:'#8B5CF6'},
    {l:'Vendas',  v:t.ve,c:'#1D9E75'}
  ];
  document.getElementById('funnel').innerHTML=steps.map(function(b){
    var w=Math.max(5,Math.round((b.v/t.le)*100));
    return '<div class="hc-fr"><div class="hc-fl">'+b.l+'</div><div class="hc-ft"><div class="hc-ff" style="width:'+w+'%;background:'+b.c+'">'+fm(b.v)+'</div></div><div class="hc-fp">'+w+'%</div></div>';
  }).join('');
}

function initInsights(){
  var mar=gM('MAR'),fev=gM('FEV'),jan=gM('JAN');
  var items=[];
  var convL=mar.to.ve/mar.to.le;
  var convO=mar.to.or?mar.to.ve/mar.to.or:0;
  var tk=mar.to.ve?mar.to.re/mar.to.ve:0;
  var tkP=fev.to.ve?fev.to.re/fev.to.ve:0;
  if(convL<0.04) items.push({c:'#E24B4A',t:'Conv. Lead→Venda em '+pc(mar.to.ve,mar.to.le)+'. Revisar acompanhamento pós-qualificação.'});
  if(convO<0.30) items.push({c:'#BA7517',t:'Apenas '+pc(mar.to.ve,mar.to.or)+' dos orçamentos viraram venda. Oportunidade no fechamento.'});
  if(mar.to.re>fev.to.re*1.3) items.push({c:'#1D9E75',t:'Receita cresceu '+((mar.to.re/fev.to.re-1)*100).toFixed(0)+'% vs fevereiro — melhor mês do trimestre.'});
  if(tk>tkP) items.push({c:'#1D9E75',t:'Ticket médio subiu de '+fmRs(tkP)+' para '+fmRs(tk)+'. Negócios de maior valor sendo fechados.'});
  var bw=mar.wk.slice().sort(function(a,b){return b.re-a.re;})[0];
  items.push({c:'#378ADD',t:'Melhor semana: '+bw.w+' ('+bw.lb+') com '+fmRs(bw.re)+' e '+bw.ve+' vendas fechadas.'});
  document.getElementById('insights').innerHTML=items.map(function(i){
    return '<div class="hc-in"><div class="hc-dot" style="background:'+i.c+'"></div><span>'+i.t+'</span></div>';
  }).join('');
}

function initPanCharts(){

      {label:'Leads',data:ms.map(function(m){return gM(m).to.le;}),backgroundColor:'#378ADD88',borderRadius:3,borderSkipped:false,yAxisID:'y'},
      {label:'Vendas',data:ms.map(function(m){return gM(m).to.ve;}),backgroundColor:'#1D9E7588',borderRadius:3,borderSkipped:false,yAxisID:'y2'}

  dch('cOV');

  var dlV2=datalabelsPlugin('#1D9E75cc',null);
  CH['cOV']=new Chart(document.getElementById('cOV'),{
    type:'bar',
    plugins:[dlO,dlV2],
    data:{labels:ms,datasets:[
      {label:'Orç.',data:ms.map(function(m){return gM(m).to.or;}),backgroundColor:'#8B5CF688',borderRadius:3,borderSkipped:false,yAxisID:'y'},
      {label:'Vendas',data:ms.map(function(m){return gM(m).to.ve;}),backgroundColor:'#1D9E7588',borderRadius:3,borderSkipped:false,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},
      plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:txtCol,font:{size:10}}},
              y:{display:false},y2:{display:false}}}

function buildWCharts(){
  var mon=D[wMon];
  var sl=mon.wk.map(function(w){return w.lb;});
  var isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  var txtCol=isDark?'#aaa':'#888';

  dch('cWLV');
  var dlWL=datalabelsPlugin('#378ADDcc',null);
  var dlWV=datalabelsPlugin('#1D9E75cc',null);
  CH['cWLV']=new Chart(document.getElementById('cWLV'),{
    type:'bar',
    plugins:[dlWL,dlWV],
    data:{labels:sl,datasets:[
      {label:'Leads',data:mon.wk.map(function(w){return w.le;}),backgroundColor:'#378ADD88',borderRadius:3,borderSkipped:false,yAxisID:'y'},
      {label:'Vendas',data:mon.wk.map(function(w){return w.ve;}),backgroundColor:'#1D9E7588',borderRadius:3,borderSkipped:false,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},
      plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:txtCol,font:{size:10},autoSkip:false,maxRotation:0}},
              y:{display:false},y2:{display:false}}}
  });

  dch('cWR');
  var dlWR=datalabelsPlugin('#BA7517cc',function(v){return fmRs(v);});
  CH['cWR']=new Chart(document.getElementById('cWR'),{
    type:'line',
    plugins:[dlWR],
    data:{labels:sl,datasets:[{data:mon.wk.map(function(w){return w.re;}),borderColor:'#BA7517',backgroundColor:'#BA751715',tension:.35,pointBackgroundColor:'#BA7517',pointRadius:4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+fmR(c.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{color:txtCol,font:{size:10},autoSkip:false,maxRotation:0}},
              y:{display:false}}}
  });
}

function buildWTable(){
  var mon=D[wMon];
  var wk=mon.wk;
  var bi=wk.reduce(function(b,w,i){return w.re>wk[b].re?i:b;},0);
  var lv=wk.map(function(w){return w.le;}),rv=wk.map(function(w){return w.re;}),ov=wk.map(function(w){return w.or;});
  var hd='<thead><tr><th>Semana</th><th>Nº</th><th>Dias</th><th>Leads</th><th>Qualif.</th><th>%Qual.</th><th>Orçam.</th><th>Orc→V</th><th>Vendas</th><th>L→V</th><th>Receita</th><th>Ticket</th></tr></thead>';
  var bd=wk.map(function(w,i){
    var cl=i===bi?' class="hc-bst"':'';
    var star=i===bi?' ★':'';
    var tk=w.ve?w.re/w.ve:0;
    return '<tr'+cl+'><td>'+w.lb+star+'</td><td><span class="hc-wb">'+w.w+'</span></td><td>'+w.di+'</td>'+
      '<td>'+sk(lv,'#378ADD')+' '+fm(w.le)+'</td><td>'+fm(w.qu)+'</td><td>'+pc(w.qu,w.le)+'</td>'+
      '<td>'+sk(ov,'#8B5CF6')+' '+fm(w.or)+'</td><td>'+pc(w.ve,w.or)+'</td>'+
      '<td>'+fm(w.ve)+'</td><td>'+pc(w.ve,w.le)+'</td>'+
      '<td>'+sk(rv,'#BA7517')+' '+fmR(w.re)+'</td><td>'+fmRs(tk)+'</td></tr>';
  }).join('');
  var t=mon.to,ttk=t.ve?t.re/t.ve:0;
  var tot='<tr class="hc-tot"><td>Total</td><td>—</td><td>'+t.di+'</td><td>'+fm(t.le)+'</td><td>'+fm(t.qu)+'</td><td>'+pc(t.qu,t.le)+'</td><td>'+fm(t.or)+'</td><td>'+pc(t.ve,t.or)+'</td><td>'+fm(t.ve)+'</td><td>'+pc(t.ve,t.le)+'</td><td>'+fmR(t.re)+'</td><td>'+fmRs(ttk)+'</td></tr>';
  document.getElementById('wtbl').innerHTML=hd+'<tbody>'+bd+tot+'</tbody>';
}

// ORIGENS
function initOPills(){
  document.getElementById('opills').innerHTML=MNS.map(function(m,i){
    return '<button class="hc-pill'+(i===oMon?' on':'')+'" data-oi="'+i+'">'+m+'</button>';
  }).join('');
}

function buildOBars(){
  var mon=D[oMon];
  var ls=mon.oL.slice().sort(function(a,b){return b.v-a.v;});
  var mxL=Math.max.apply(null,ls.map(function(x){return x.v;}).concat([1]));
  document.getElementById('oLeads').innerHTML=ls.map(function(o){
    var w=Math.max(4,Math.round((o.v/mxL)*100));
    return '<div class="hc-or"><div class="hc-ol">'+o.o+'</div><div class="hc-ot"><div class="hc-of" style="width:'+w+'%;background:#378ADD">'+fm(o.v)+'</div></div><div class="hc-on">'+pc(o.v,mon.to.le)+'</div></div>';
  }).join('');
}

function buildOChart(){
  var mon=D[oMon];
  dch('cDnut');
  var cols=['#378ADD','#1D9E75','#BA7517','#8B5CF6','#E24B4A'];
  var isDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  CH['cDnut']=new Chart(document.getElementById('cDnut'),{type:'doughnut',
    data:{labels:mon.oL.map(function(o){return o.o;}),datasets:[{data:mon.oL.map(function(o){return o.v;}),backgroundColor:cols,borderWidth:2,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'right',labels:{color:isDark?'#aaa':'#666',font:{size:11},boxWidth:10,padding:10}},
        tooltip:{callbacks:{label:function(c){return ' '+fm(c.raw)+' leads ('+pc(c.raw,mon.to.le)+')';}}}}}});
}

// FECHADAS
function initFPills(){

function buildFTable(){
  var mon=D[fMon];

// TABS
document.querySelector('.hc-tabs').addEventListener('click',function(e){
  var btn=e.target.closest('.hc-tab'); if(!btn) return;
  document.querySelectorAll('.hc-tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.hc-pane').forEach(function(p){p.classList.remove('on');});
  btn.classList.add('on');
  var tab=btn.dataset.tab;
  document.getElementById('pane-'+tab).classList.add('on');
  if(tab==='semanal') setTimeout(function(){buildWCharts();buildWTable();},30);
  if(tab==='origens') setTimeout(function(){buildOBars();buildOChart();},30);
  if(tab==='fechadas') setTimeout(function(){buildFTable();},30);
});
