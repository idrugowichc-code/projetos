var MNS=['JAN','FEV','MAR','ABR'];
var wI=3,oI=3,vI=3,fI=1;
var CH={};

function gM(n){return D.find(function(d){return d.nm===n;});}
function fm(n){return (n||0).toLocaleString('pt-BR',{maximumFractionDigits:0});}
function fR(n){return 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fRs(n){return 'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});}
function pc(a,b){return b?((a/b)*100).toFixed(1)+'%':'—';}
function dl(c,p){
  if(!p||!c) return '<span class="nt">—</span>';
  var d=((c-p)/p*100);
  return '<span class="'+(d>=0?'up':'dn')+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(1)+'%</span>';
}
function dch(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
function sk(vals,col){
  var mx=Math.max.apply(null,vals.concat([1]));
  return '<span class="sk">'+vals.map(function(v){return '<span class="sb" style="height:'+Math.max(2,Math.round((v/mx)*12))+'px;background:'+col+'88"></span>';}).join('')+'</span>';
}
function dlP(col,fn){
  return {id:'p'+Math.floor(Math.random()*9999),afterDatasetsDraw:function(ch){
    var ctx=ch.ctx;
    ch.data.datasets.forEach(function(ds,di){
      var mt=ch.getDatasetMeta(di); if(mt.hidden) return;
      mt.data.forEach(function(b,i){
        var v=ds.data[i]; if(!v) return;
        ctx.save();ctx.font='500 10px sans-serif';ctx.fillStyle=col;
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(fn?fn(v):fm(v),b.x,b.y-3);ctx.restore();
      });
    });
  }};
}
function tC(){return window.matchMedia('(prefers-color-scheme: dark)').matches?'#aaa':'#888';}

function stTag(st){
  var s=(st||'').toLowerCase();
  if(s==='ok') return '<span class="tag tag-ok">OK</span>';
  if(s==='pendente') return '<span class="tag tag-pend">Pendente</span>';
  if(s) return '<span class="tag">'+st+'</span>';
  return '';
}

    'Ritmo de '+Math.round(abr.to.le/abr.to.di)+' leads/dia projeta <strong>~'+fm(projMes)+' leads</strong> no mes. '+

  document.getElementById('kpis-abr').innerHTML=[
    {l:'Leads captados',cv:fm(abr.to.le),pv:fm(mar.to.le),extra:'Proj. mes: ~'+fm(projMes),hl:true},
    {l:'Qualificados',cv:fm(abr.to.qu),pv:fm(mar.to.qu),extra:'% Qual: '+pc(abr.to.qu,abr.to.le),hl:true},
    {l:'Visitas',cv:fm(abr.to.vis),pv:fm(mar.to.vis),extra:'2 dias uteis',hl:true},
    {l:'Dias uteis',cv:'2 / 20',pv:'20 / 20',extra:'18 dias restantes',hl:false}
  ].map(function(r){
    return '<div class="'+(r.hl?'kpi-hl':'kpi')+'">'+
      '<div class="'+(r.hl?'kl-hl':'kl')+'">'+r.l+'</div>'+
      '<div class="'+(r.hl?'kv-hl':'kv')+'">'+r.cv+'</div>'+
      '<div class="kd">'+dl(r.hl?parseFloat(r.cv)||0:0,r.hl?parseFloat(r.pv)||0:0)+' vs mar</div>'+
      '<div class="kp">'+r.extra+'</div>'+
    '</div>';
  }).join('');

  function bFn(steps,total,elId){
    document.getElementById(elId).innerHTML=steps.map(function(s){
      var w=total?Math.max(3,Math.round((s.v/total)*100)):0;
      return '<div class="fr"><div class="fl">'+s.l+'</div><div class="ft">'+
        (s.v?'<div class="ff" style="width:'+w+'%;background:'+s.c+'">'+fm(s.v)+'</div>':'<div style="height:100%;display:flex;align-items:center;padding-left:8px;font-size:11px;color:var(--color-text-secondary)">—</div>')+
        '</div><div class="fp">'+(s.v?w+'%':'—')+'</div></div>';
    }).join('');
  }
  bFn([{l:'Leads',v:abr.to.le,c:'#378ADD'},{l:'Qualif.',v:abr.to.qu,c:'#BA7517'},{l:'Visitas',v:abr.to.vis,c:'#06B6D4'},{l:'Orçam.',v:abr.to.or,c:'#8B5CF6'},{l:'Vendas',v:abr.to.ve,c:'#1D9E75'}],abr.to.le,'fn-abr');
  bFn([{l:'Leads',v:mar.to.le,c:'#378ADD'},{l:'Qualif.',v:mar.to.qu,c:'#BA7517'},{l:'Visitas',v:mar.to.vis,c:'#06B6D4'},{l:'Orçam.',v:mar.to.or,c:'#8B5CF6'},{l:'Vendas',v:mar.to.ve,c:'#1D9E75'}],mar.to.le,'fn-mar');

  var acum={le:0,ve:0,re:0,vis:0};
  D.forEach(function(m){acum.le+=m.to.le;acum.ve+=m.to.ve;acum.re+=m.to.re;acum.vis+=m.to.vis;});
  var aTk=acum.ve?acum.re/acum.ve:0;
  document.getElementById('acum').innerHTML=[
    {l:'Leads acum.',v:fm(acum.le)},{l:'Visitas acum.',v:fm(acum.vis)},
    {l:'Vendas acum.',v:fm(acum.ve)},{l:'Receita acum.',v:fRs(acum.re)}
  ].map(function(r){return '<div class="kpi"><div class="kl">'+r.l+'</div><div class="kv">'+r.v+'</div></div>';}).join('');

  document.getElementById('ins').innerHTML=[
    {c:'#1D9E75',t:'Abril: '+fm(abr.to.le)+' leads e '+fm(abr.to.vis)+' visitas em apenas 2 dias. Projecao de ~'+fm(projMes)+' leads no mes — acima da media de '+fm(Math.round((jan.to.le+fev.to.le+mar.to.le)/3))+'.'},
    {c:'#E24B4A',t:'Receita de marco ('+fRs(mar.to.re)+') bem abaixo de fev ('+fRs(fev.to.re)+'). Orcamentos abertos de marco sao pipeline prioritario em abril.'},
    {c:'#06B6D4',t:'Marco teve 12 visitas — recorde do trimestre. Abril ja iniciou com 2 visitas em 2 dias, mantendo o ritmo.'},
